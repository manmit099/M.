<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Study System</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#000;
--surface:#13161e;
--front:#161b26;
--back:#0f1a2e;
--border:#1e2d45;

--blue:#3b82f6;
--yellow:#f5c842;
--red:#f87171;
--green:#34d399;

--text:#e2e8f0;
--muted:#64748b;
}

*{box-sizing:border-box}

body{
margin:0;
background:#000;
color:var(--text);
font-family:'Sora',sans-serif;
display:flex;
justify-content:center;
padding:25px;
}

.app{
width:min(520px,100%);
display:flex;
flex-direction:column;
gap:18px;
}

header{text-align:center}

.badge{
font-family:'Space Mono',monospace;
border:1px solid var(--border);
padding:4px 10px;
border-radius:20px;
font-size:.75rem;
color:var(--muted);
display:inline-block;
}

.subtitle{
font-size:.85rem;
color:var(--muted);
}

.progress{
height:8px;
background:var(--surface);
border-radius:20px;
overflow:hidden;
}

.progress-fill{
height:100%;
background:linear-gradient(90deg,var(--blue),var(--yellow));
width:0%;
transition:.3s;
}

.progress-label{
text-align:center;
font-size:.8rem;
margin-top:6px;
color:var(--muted);
}

.flashcard{
perspective:1000px;
}

.card{
width:100%;
height:260px;
position:relative;
transform-style:preserve-3d;
transition:transform .6s;
}

.card.flipped{
transform:rotateY(180deg);
}

.card-face{
position:absolute;
width:100%;
height:100%;
border-radius:12px;
border:1px solid var(--border);
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:24px;
font-family:'Space Mono',monospace;
font-size:1.15rem;
backface-visibility:hidden;
}

.card-front{
background:var(--front);
}

.card-back{
background:var(--back);
transform:rotateY(180deg);
}

.card-back-inner{
transform:rotateY(180deg);
}

.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

button{
background:var(--surface);
border:1px solid var(--border);
color:var(--text);
padding:10px 16px;
border-radius:10px;
cursor:pointer;
min-height:44px;
}

button:hover{transform:scale(.96)}

.rate-hard{border-color:var(--red);color:var(--red)}
.rate-ok{border-color:var(--yellow);color:var(--yellow)}
.rate-easy{border-color:var(--green);color:var(--green)}

.dots{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:6px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:#333;
}

.dot.active{background:var(--blue)}
.dot.rated{background:var(--green)}

.dashboard{
background:var(--surface);
padding:16px;
border-radius:10px;
display:flex;
justify-content:space-around;
font-family:'Space Mono',monospace;
}

.review{
display:none;
flex-direction:column;
gap:18px;
}

.review-group{
background:var(--surface);
padding:16px;
border-radius:10px;
}

.review-card{
border:1px solid var(--border);
padding:10px;
border-radius:8px;
margin-top:8px;
font-family:'Space Mono',monospace;
}

footer{
text-align:center;
font-size:.8rem;
color:var(--muted);
font-family:'Space Mono',monospace;
margin-top:10px;
}

@media print{

body{
background:white;
color:black;
}

header,
.controls,
.flashcard,
.dots,
.dashboard,
footer{
display:none;
}

.review{
display:block;
}

.review-card{
break-inside:avoid;
}

}

</style>
</head>

<body>

<div class="app">

<header>
<div class="badge">🐍 Flashcard Study</div>
<h2>Python Variables & Data Types</h2>
<div class="subtitle">15 Practice Cards</div>
</header>

<div class="dashboard">
<div>Total: <span id="stat-total"></span></div>
<div>Hard: <span id="stat-hard"></span></div>
<div>Almost: <span id="stat-ok"></span></div>
<div>Easy: <span id="stat-easy"></span></div>
</div>

<div>
<div class="progress"><div class="progress-fill"></div></div>
<div class="progress-label"></div>
</div>

<div class="flashcard">
<div class="card" id="card">

<div class="card-face card-front">
<div id="question"></div>
</div>

<div class="card-face card-back">
<div class="card-back-inner">
<div id="answer"></div>
</div>
</div>

</div>
</div>

<div class="controls">
<button id="prev">Previous</button>
<button id="flip">Flip</button>
<button id="next">Next</button>
</div>

<div class="controls">
<button class="rate-hard">Hard (1)</button>
<button class="rate-ok">Almost (2)</button>
<button class="rate-easy">Easy (3)</button>
</div>

<div class="dots"></div>

<div class="review" id="review"></div>

<footer>CODEx099 by MANMIT ASHTURE</footer>

</div>

<script>

const cards=[

{q:"What is a variable?",a:"A container that stores a value."},
{q:"Where are variables stored?",a:"In computer memory (RAM)."},
{q:"How do you assign a value to a variable?",a:"x = 10"},
{q:"What is a data type?",a:"Classification of data."},
{q:"Two numeric data types?",a:"int and float"},
{q:"Function to check type?",a:"type(x)"},
{q:"What data type stores text?",a:"str"},
{q:"Boolean values?",a:"True and False"},
{q:"What is a list?",a:"Ordered mutable collection"},
{q:"What is tuple?",a:"Ordered immutable collection"},
{q:"Mutable means?",a:"Value can change"},
{q:"Immutable means?",a:"Value cannot change"},
{q:"Dictionary?",a:"Collection of key-value pairs"},
{q:"Everything is an object means?",a:"All values are objects"},
{q:"Example variable?",a:"name = 'Python'"}

]

let current=0
let ratings=JSON.parse(localStorage.getItem("ratings"))||new Array(cards.length).fill(null)

const q=document.getElementById("question")
const a=document.getElementById("answer")
const card=document.getElementById("card")
const progress=document.querySelector(".progress-fill")
const label=document.querySelector(".progress-label")
const dots=document.querySelector(".dots")

cards.forEach(()=>{
let d=document.createElement("div")
d.className="dot"
dots.appendChild(d)
})

function updateStats(){

document.getElementById("stat-total").textContent=cards.length
document.getElementById("stat-hard").textContent=ratings.filter(r=>r==="Hard").length
document.getElementById("stat-ok").textContent=ratings.filter(r=>r==="Almost").length
document.getElementById("stat-easy").textContent=ratings.filter(r=>r==="Easy").length

}

function render(){

q.textContent=cards[current].q
a.textContent=cards[current].a

progress.style.width=((current+1)/cards.length*100)+"%"
label.textContent=`Card ${current+1} of ${cards.length}`

document.querySelectorAll(".dot").forEach((d,i)=>{
d.classList.toggle("active",i===current)
d.classList.toggle("rated",ratings[i])
})

card.classList.remove("flipped")

updateStats()

}

function rate(val){

ratings[current]=val
localStorage.setItem("ratings",JSON.stringify(ratings))

if(ratings.every(r=>r)){
setTimeout(showReview,400)
}else{
current=(current+1)%cards.length
render()
}

}

document.getElementById("flip").onclick=()=>card.classList.toggle("flipped")

document.getElementById("next").onclick=()=>{
current=(current+1)%cards.length
render()
}

document.getElementById("prev").onclick=()=>{
current=(current-1+cards.length)%cards.length
render()
}

document.querySelector(".rate-hard").onclick=()=>rate("Hard")
document.querySelector(".rate-ok").onclick=()=>rate("Almost")
document.querySelector(".rate-easy").onclick=()=>rate("Easy")

function showReview(){

document.querySelector(".flashcard").style.display="none"
document.querySelectorAll(".controls").forEach(e=>e.style.display="none")
dots.style.display="none"

const review=document.getElementById("review")
review.style.display="flex"

const groups={Hard:[],Almost:[],Easy:[]}

cards.forEach((c,i)=>groups[ratings[i]].push(c))

for(const g in groups){

let section=document.createElement("div")
section.className="review-group"
section.innerHTML=`<h3>${g}</h3>`

groups[g].forEach(card=>{
let rc=document.createElement("div")
rc.className="review-card"
rc.innerHTML=`<strong>${card.q}</strong>${card.a}`
section.appendChild(rc)
})

review.appendChild(section)

}

let controls=document.createElement("div")
controls.className="controls"
controls.innerHTML=`
<button onclick="window.print()">Print / Save PDF</button>
<button onclick="saveHTML()">Save as HTML</button>
<button onclick="restart()">Restart</button>
`

review.appendChild(controls)

}

function restart(){
ratings=new Array(cards.length).fill(null)
localStorage.removeItem("ratings")
location.reload()
}

function saveHTML(){
const blob=new Blob([document.documentElement.outerHTML],{type:"text/html"})
const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="flashcards.html"
a.click()
}

document.addEventListener("keydown",e=>{
if(e.code==="Space"||e.code==="Enter"){card.classList.toggle("flipped")}
if(e.key==="ArrowRight"){current=(current+1)%cards.length;render()}
if(e.key==="ArrowLeft"){current=(current-1+cards.length)%cards.length;render()}
if(e.key==="1")rate("Hard")
if(e.key==="2")rate("Almost")
if(e.key==="3")rate("Easy")
})

let startX=null

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX

if(endX-startX>50){
current=(current-1+cards.length)%cards.length
render()
}
else if(startX-endX>50){
current=(current+1)%cards.length
render()
}
else{
card.classList.toggle("flipped")
}

})

render()

</script>

</body>
</html>
